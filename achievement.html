<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Achievement Gallery | Archchana Vijayanathan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Achievement Page Specific Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.6;
      cursor: default;
    }

    .gallery-header {
      padding: 100px 0 50px;
      text-align: center;
      background: linear-gradient(135deg, #0a0a0a, #0f0f15);
      border-bottom: 1px solid rgba(191, 75, 255, 0.2);
    }

    .gallery-header h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #bf4bff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .gallery-header p {
      color: #b0b0b0;
      margin-bottom: 1.5rem;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(191, 75, 255, 0.15);
      color: #bf4bff;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s;
      border: 1px solid rgba(191, 75, 255, 0.3);
      font-weight: 500;
    }

    .back-home:hover {
      background: rgba(191, 75, 255, 0.3);
      transform: translateY(-3px);
    }

    .achievement-detail-page {
      padding: 40px 0 80px;
      background: #0a0a0a;
      min-height: calc(100vh - 200px);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .achievement-container {
      max-width: 1000px;
      margin: 0 auto;
      background: #111115;
      border-radius: 30px;
      border: 1px solid #222;
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .achievement-banner {
      background: linear-gradient(135deg, rgba(191, 75, 255, 0.15), rgba(255, 107, 157, 0.08));
      padding: 40px;
      text-align: center;
      border-bottom: 1px solid rgba(191, 75, 255, 0.3);
    }

    .achievement-banner i {
      font-size: 4rem;
      color: #bf4bff;
      margin-bottom: 1rem;
    }

    .achievement-banner h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .achievement-banner p {
      color: #b0b0b0;
    }

    .certificate-gallery {
      padding: 40px;
    }

    .gallery-title {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #bf4bff;
      border-left: 4px solid #bf4bff;
      padding-left: 15px;
    }

    .certificate-image {
      width: 100%;
      border-radius: 20px;
      border: 1px solid #333;
      margin-bottom: 30px;
      overflow: hidden;
      background: #1a1a2e;
    }

    .certificate-image img {
      width: 100%;
      display: block;
      transition: transform 0.3s;
    }

    .certificate-image img:hover {
      transform: scale(1.02);
    }

    .additional-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    .additional-img {
      background: #1a1a2e;
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid #333;
      transition: all 0.3s;
    }

    .additional-img:hover {
      transform: translateY(-5px);
      border-color: #bf4bff;
    }

    .additional-img img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .additional-img p {
      padding: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: #bf4bff;
    }

    .achievement-details {
      background: #0a0a0a;
      padding: 25px;
      border-radius: 15px;
      margin-top: 20px;
      border: 1px solid #222;
    }

    .achievement-details h4 {
      color: #bf4bff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .achievement-details ul {
      list-style: none;
      padding-left: 0;
    }

    .achievement-details li {
      padding: 8px 0;
      padding-left: 25px;
      position: relative;
      color: #ccc;
    }

    .achievement-details li::before {
      content: '🏆';
      position: absolute;
      left: 0;
    }

    .info-row {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #222;
      color: #888;
      font-size: 0.9rem;
    }

    .info-row i {
      color: #bf4bff;
      width: 25px;
    }

    .not-found {
      text-align: center;
      padding: 60px;
    }

    .not-found i {
      font-size: 4rem;
      color: #bf4bff;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .gallery-header h1 {
        font-size: 2rem;
      }
      .certificate-gallery {
        padding: 20px;
      }
      .achievement-banner {
        padding: 25px;
      }
      .achievement-banner h2 {
        font-size: 1.3rem;
      }
      .container {
        padding: 0 1rem;
      }
      .additional-images {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="gallery-header">
  <div class="container">
    <i class="fas fa-trophy" style="font-size: 3rem; color: #bf4bff;"></i>
    <h1>Achievements Gallery</h1>
    <p>Certificates and memories from my journey</p>
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>
  </div>
</div>

<section class="achievement-detail-page">
  <div class="container">
    <div id="achievementContent" class="achievement-container">
      <!-- Dynamic content will be loaded here -->
      <div class="achievement-banner">
        <i class="fas fa-spinner fa-spin"></i>
        <h2>Loading...</h2>
      </div>
    </div>
  </div>
</div>

<script>
  // ========================================
  // ACHIEVEMENTS DATA - UPDATE YOUR IMAGES HERE
  // ========================================
  // Just place your images in the "achievements" folder
  // and update the image paths below
  // ========================================

  const achievementsData = {
    // Achievement 1: SEUSL Designathon 2026 - 1st Place Winner
    'seusl-designathon': {
      title: '🏆 1st Place Winner - SEUSL Designathon 2026',
      icon: 'fa-crown',
      description: 'First place winner at the South Eastern University Designathon competition, recognized for innovative design solutions and exceptional user experience.',
      certificateImage: 'achievements/seusl-designathon-certificate.jpg',
      additionalImages: [
        { src: 'achievements/3.jpeg', caption: 'Group Work' },
        { src: 'achievements/seusl-event-photo2.jpg', caption: 'Team Photo' },
        { src: 'achievements/seusl-project-showcase.jpg', caption: 'Award Ceremony' }
      ],
      details: [
        'Competed against 50+ teams from across the region',
        'Presented innovative UI/UX solution for campus navigation',
        'Awarded first place for design excellence and user research',
        'Received trophy and certificate from university officials'
      ],
      date: 'March 2026',
      organizer: 'South Eastern University of Sri Lanka'
    },

    // Achievement 2: SLIIT Designathon - Top 10
    'sliit-designathon': {
      title: 'Top 10 - SLIIT Designathon',
      icon: 'fa-trophy',
      description: 'Ranked among top 10 participants at SLIIT Designathon, showcasing exceptional UI/UX design skills and creative problem solving.',
      certificateImage: 'achievements/sliit-designathon-certificate.jpg',
      additionalImages: [
        { src: 'achievements/sliit-event.jpg', caption: 'Competition Day' },
        { src: 'achievements/sliit-design.jpg', caption: 'Design Submission' },
        { src: 'achievements/sliit-team.jpg', caption: 'With Team Members' }
      ],
      details: [
        'Selected among top 10 out of 100+ participants',
        'Designed user centered solution for social impact',
        'Received recognition from SLIIT faculty',
        'Certificate of achievement awarded'
      ],
      date: '2025',
      organizer: 'SLIIT'
    },

    // Achievement 3: Deckathon Hackathon - Top 6-10

    // Achievement 4: Figma Workshop Instructor
    'figma-workshop': {
      title: 'Instructor - Figma Workshop',
      icon: 'fa-chalkboard-teacher',
      description: 'Conducted Figma workshop as an instructor, teaching UI/UX design fundamentals to university students.',
      certificateImage: 'achievements/figma-workshop-certificate.jpg',
      additionalImages: [
        { src: 'achievements/workshop-teaching.jpg', caption: 'Teaching Session' },
        { src: 'achievements/workshop-students.jpg', caption: 'Workshop Participants' },
        { src: 'achievements/workshop-certificate.jpg', caption: 'Explaining Session' }
      ],
      details: [
        'Trained 30+ students on Figma basics',
        'Covered wireframing, prototyping, and design systems',
        'Received instructor appreciation certificate',
        'Positive feedback from participants'
      ],
      date: '2025',
      organizer: 'University Workshop'
    },

    // Achievement 5: SLASSCOM Hack Like a Girl 3.0 - Top 25
    // 'hack-like-girl': {
    //   title: 'Top 25 - SLASSCOM Hack Like a Girl 3.0',
    //   icon: 'fa-award',
    //   description: 'Ranked among top 25 participants in Hack Like a Girl competition, celebrating women in technology and innovation.',
    //   certificateImage: 'achievements/hack-like-girl-certificate.jpg',
    //   additionalImages: [
    //     { src: 'achievements/hack-like-girl-event.jpg', caption: 'Event Day' },
    //     { src: 'achievements/hack-like-girl-team.jpg', caption: 'Team Photo' },
    //     { src: 'achievements/hack-like-girl-presentation.jpg', caption: 'Project Presentation' }
    //   ],
    //   details: [
    //     'Competed in all-female hackathon',
    //     'Built AI-powered solution for social good',
    //     'Selected as top 25 from 200+ applicants',
    //     'Networking with industry professionals'
    //   ],
    //   date: '2025',
    //   organizer: 'SLASSCOM'
    // },

    // Achievement 6: SAHASAK NIMAVUM 2024 - National Inventions Exhibition
    'sahasak-nimavum': {
      title: 'Participant - SAHASAK NIMAVUM 2024',
      icon: 'fa-microchip',
      description: 'National Inventions Exhibition & Competition - IoT, Mobile & AI based Smart Cradle System',
      certificateImage: 'achievements/sahasak-nimavum-certificate.jpg',
      additionalImages: [
        { src: 'achievements/smart-cradle-system.jpg', caption: 'Smart Cradle Project' },
        { src: 'achievements/exhibition-booth.jpg', caption: 'Exhibition Booth' },
        { src: 'achievements/award-ceremony.jpg', caption: 'Award Ceremony' },
      ],
      details: [
        'Presented IoT based Smart Cradle System',
        'Integrated mobile app and AI features for baby monitoring',
        'Represented university at national level exhibition',
        'Recognized by Sri Lanka Inventors Commission',
        'Showcased innovation to industry experts'
      ],
      date: 'April 27, 2025',
      organizer: 'Sri Lanka Inventors Commission, Ministry of Science and Technology'
    },

    // Achievement 7: English Day Oratory Competition - 3rd Place Province
    'english-oratory': {
      title: '🥉 3rd Place - Province Level - English Day Oratory Competition',
      icon: 'fa-microphone-alt',
      description: 'Prepared Speech category at Provincial Level Competition | School Representation',
      certificateImage: 'achievements/english-oratory-certificate.jpg',
    
      details: [
        'Competed against representatives from multiple schools across the province',
        'Delivered prepared speech on relevant social topic with confidence',
        'Awarded 3rd place at provincial level competition',
        'Recognized for excellent oratory skills and English proficiency',
        'Brought honor to school at provincial level'
      ],
      date: 'School Year',
      organizer: 'Provincial Education Department'
    }
  };

  // Get achievement ID from URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const achievementId = urlParams.get('id');

  // Load achievement data
  if (achievementId && achievementsData[achievementId]) {
    const data = achievementsData[achievementId];
    const container = document.getElementById('achievementContent');
    
    // Build additional images HTML
    let additionalImagesHtml = '';
    if (data.additionalImages && data.additionalImages.length > 0) {
      additionalImagesHtml = `
        <h3 class="gallery-title" style="margin-top: 20px;"><i class="fas fa-images"></i> Event Gallery</h3>
        <div class="additional-images">
          ${data.additionalImages.map(img => `
            <div class="additional-img">
              <img src="${img.src}" alt="${img.caption}" onerror="this.src='https://placehold.co/400x300/1a1a2e/bf4bff?text=Image+Coming+Soon'">
              <p><i class="fas fa-camera"></i> ${img.caption}</p>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    // Build details HTML
    let detailsHtml = '';
    if (data.details && data.details.length > 0) {
      detailsHtml = `
        <div class="achievement-details">
          <h4><i class="fas fa-info-circle"></i> Achievement Details</h4>
          <ul>
            ${data.details.map(detail => `<li>${detail}</li>`).join('')}
          </ul>
          <div class="info-row">
            <p><i class="fas fa-calendar-alt"></i> <strong>Date:</strong> ${data.date}</p>
            <p style="margin-top: 8px;"><i class="fas fa-building"></i> <strong>Organized by:</strong> ${data.organizer}</p>
          </div>
        </div>
      `;
    }
    
    // Build the complete HTML
    container.innerHTML = `
      <div class="achievement-banner">
        <i class="fas ${data.icon}"></i>
        <h2>${data.title}</h2>
        <p>${data.description}</p>
      </div>
      <div class="certificate-gallery">
        <h3 class="gallery-title"><i class="fas fa-certificate"></i> Certificate</h3>
        <div class="certificate-image">
          <img src="${data.certificateImage}" alt="${data.title} Certificate" onerror="this.src='https://placehold.co/800x600/1a1a2e/bf4bff?text=Certificate+Image'">
        </div>
        
        ${additionalImagesHtml}
        
        ${detailsHtml}
      </div>
    `;
  } else {
    // Achievement not found
    document.getElementById('achievementContent').innerHTML = `
      <div class="achievement-banner not-found">
        <i class="fas fa-exclamation-triangle"></i>
        <h2>Achievement Not Found</h2>
        <p>The achievement you're looking for doesn't exist or has been moved.</p>
        <a href="index.html#achievements" class="back-home" style="margin-top: 20px; display: inline-flex;">
          <i class="fas fa-arrow-left"></i> Back to Achievements
        </a>
      </div>
    `;
  }
</script>

</body>
</html>
