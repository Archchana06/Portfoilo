<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Achievement | Archchana Vijayanathan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.6;
      cursor: pointer;
    }
    .achievement-header {
      padding: 100px 0 50px;
      text-align: center;
      background: linear-gradient(135deg, #0a0a0a, #0f0f15);
      border-bottom: 1px solid rgba(191, 75, 255, 0.2);
    }
    .achievement-header h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #bf4bff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .achievement-header p {
      color: #b0b0b0;
      margin-bottom: 1.5rem;
    }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(191, 75, 255, 0.15);
      color: #bf4bff;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s;
      border: 1px solid rgba(191, 75, 255, 0.3);
      font-weight: 500;
    }
    .back-home:hover {
      background: rgba(191, 75, 255, 0.3);
      transform: translateY(-3px);
    }
    .achievement-detail-page {
      padding: 40px 0 80px;
      background: #0a0a0a;
      min-height: calc(100vh - 200px);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    .achievement-container {
      max-width: 1000px;
      margin: 0 auto;
      background: #111115;
      border-radius: 30px;
      border: 1px solid #222;
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
      padding: 40px;
      text-align: center;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .achievement-icon {
      font-size: 4rem;
      color: #bf4bff;
      margin-bottom: 1rem;
    }
    .achievement-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    .achievement-description {
      color: #b0b0b0;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }
    .achievement-date {
      color: #bf4bff;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .achievement-organizer {
      color: #888;
      font-size: 0.85rem;
    }
    
    /* Certificate Image Styles */
    .certificate-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #333;
    }
    .certificate-title {
      color: #bf4bff;
      margin-bottom: 1rem;
      font-size: 1.2rem;
      text-align: left;
    }
    .certificate-image {
      width: 100%;
      border-radius: 20px;
      border: 1px solid #333;
      overflow: hidden;
      background: #1a1a2e;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }
    .certificate-image img {
      width: 100%;
      display: block;
      transition: transform 0.3s;
    }
    .certificate-image:hover img {
      transform: scale(1.02);
    }
    
    /* Event Gallery Styles */
    .event-gallery {
      margin-top: 1.5rem;
    }
    .gallery-title {
      color: #bf4bff;
      margin-bottom: 1rem;
      font-size: 1.2rem;
      text-align: left;
    }
    .additional-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }
    .additional-img {
      background: #1a1a2e;
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid #333;
      transition: all 0.3s;
      cursor: pointer;
    }
    .additional-img:hover {
      transform: translateY(-5px);
      border-color: #bf4bff;
    }
    .additional-img img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .additional-img p {
      padding: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: #bf4bff;
    }
    
    /* Lightbox Modal */
    .lightbox-modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
    }
    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      margin: auto;
      animation: zoomIn 0.3s ease;
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .lightbox-content img {
      width: 100%;
      height: auto;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid #bf4bff;
      box-shadow: 0 0 40px rgba(191, 75, 255, 0.3);
    }
    .lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: #fff;
      font-size: 35px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }
    .lightbox-close:hover {
      color: #bf4bff;
    }
    .lightbox-caption {
      text-align: center;
      color: #bf4bff;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .achievement-details-list {
      text-align: left;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #333;
    }
    .achievement-details-list h3 {
      color: #bf4bff;
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }
    .achievement-details-list ul {
      list-style: none;
      padding-left: 0;
    }
    .achievement-details-list li {
      padding: 8px 0;
      padding-left: 25px;
      position: relative;
      color: #ccc;
    }
    .achievement-details-list li::before {
      content: "🏆";
      position: absolute;
      left: 0;
    }
    .not-found {
      text-align: center;
      padding: 60px;
    }
    .not-found i {
      font-size: 4rem;
      color: #bf4bff;
      margin-bottom: 1rem;
    }
    
    @media (max-width: 768px) {
      .achievement-header h1 { font-size: 2rem; }
      .achievement-container { padding: 25px; }
      .achievement-title { font-size: 1.3rem; }
      .container { padding: 0 1rem; }
      .additional-images { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="achievement-header">
  <div class="container">
    <i class="fas fa-trophy" style="font-size: 3rem; color: #bf4bff"></i>
    <h1>Achievement Details</h1>
    <p>Celebrating my journey and accomplishments</p>
    <a href="index.html#achievements" class="back-home">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>
  </div>
</div>

<section class="achievement-detail-page">
  <div class="container">
    <div id="achievementContent" class="achievement-container">
      <div class="achievement-icon">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <h2 class="achievement-title">Loading...</h2>
    </div>
  </div>
</section>

<!-- Lightbox Modal -->
<div id="lightboxModal" class="lightbox-modal">
  <div class="lightbox-content">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImage" src="" alt="Image">
    <div id="lightboxCaption" class="lightbox-caption"></div>
  </div>
</div>

<script>
  // Lightbox functionality
  const lightboxModal = document.getElementById('lightboxModal');
  const lightboxImage = document.getElementById('lightboxImage');
  const lightboxCaption = document.getElementById('lightboxCaption');
  const closeBtn = document.querySelector('.lightbox-close');

  function openLightbox(imageSrc, caption) {
    lightboxImage.src = imageSrc;
    lightboxCaption.textContent = caption;
    lightboxModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightboxModal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  if (closeBtn) closeBtn.addEventListener('click', closeLightbox);
  lightboxModal.addEventListener('click', (e) => {
    if (e.target === lightboxModal) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightboxModal.style.display === 'flex') closeLightbox();
  });

  // Achievement Data with Images
  const achievementsData = {
    'seusl-designathon': {
      title: "🏆 1st Place Winner - SEUSL Designathon 2026",
      icon: "fa-crown",
      description: "First place winner at the South Eastern University Designathon competition.",
      certificateImage: "achievements/seusl-designathon-certificate.jpg",
      additionalImages: [
        { src: "achievements/seusl-project-showcase.jpg", caption: "Award Ceremony" },
        { src: "achievements/seusl-event-photo2.jpg", caption: "Team Photo" },
        { src: "achievements/seusl-event-photo3.jpg", caption: "Competion Day" }
      ],
      details: [
        "Competed against 50+ teams",
        "Presented innovative UI/UX solution",
        "Awarded first place for design excellence",
        "Received trophy and certificate"
      ],
      date: "March 2026",
      organizer: "South Eastern University of Sri Lanka"
    },
    'sliit-designathon': {
      title: "Top 10 - SLIIT Designathon",
      icon: "fa-trophy",
      description: "Ranked among top 10 participants at SLIIT Designathon.",
      certificateImage: "achievements/sliit-designathon-certificate.jpg",
      additionalImages: [
        { src: "achievements/sliit-event.jpg", caption: "Competition Day" },
        { src: "achievements/sliit-design.jpg", caption: "Design Submission" },
         { src: "achievements/sliit-team.jpg", caption: "Team Members" }
      ],
      details: [
        "Selected among top 10 out of 100+ participants",
        "Designed user-centered solution",
        "Received recognition from SLIIT faculty",
        "Certificate of achievement awarded"
      ],
      date: "2025",
      organizer: "SLIIT"
    },
    'figma-workshop': {
      title: "Instructor - Figma Workshop",
      icon: "fa-chalkboard-teacher",
      description: "Conducted Figma workshop for SEUSL Designathon participants.",
      certificateImage: "achievements/figma-workshop-certificate.jpg",
      certificateImage: "achievements/figma-workshop-certificate.jpg",
      additionalImages: [
        { src: "achievements/workshop-teaching.jpg", caption: "Teaching Session" },
        { src: "achievements/workshop-certificate.jpg", caption: "Workshop Day" },
        { src: "achievements/workshop-students.jpg", caption: "Workshop Participants" },
      ],
      details: [
        "Trained 50+ students on Figma basics",
        "Covered wireframing and prototyping",
        "Received instructor appreciation certificate",
        "Positive feedback from participants"
      ],
      date: "March 2026",
      organizer: "SEUSL Designathon"
    },
    'hack-like-girl': {
  title: "🏆 Top 10 Selected - Hack Like a Girl 3.0",
  icon: "fa-award",
  description: "First selected among Top 25, then advanced to Top 10 at Hack Like a Girl 3.0, an all-female hackathon organized by SLASSCOM celebrating women in technology.",
  certificateImage: "achievements/hack-like-girl-certificate.jpg",
  additionalImages: [
    { src: "achievements/hack-like-girl-event.jpg", caption: "Top 25 Event day" },
    { src: "achievements/hack-like-girl-team.jpg", caption: "Top 10 Participants Photo" },
    { src: "achievements/hack-like-girl-presentation.jpg", caption: "Project Presentation" }
  ],
  details: [
    "First selected among Top 25 out of 200+ applicants across Sri Lanka",
    "Advanced to Top 10 in the competition",
    "Built AI-powered solution for social good",
    "Competed in all-female hackathon celebrating women in tech",
    "Networked with industry professionals and mentors",
    "Certificate of achievement awarded by SLASSCOM"
  ],
  date: "2025",
  organizer: "SLASSCOM (Sri Lanka Association for Software and Services Companies)"
},
    'sahasak-nimavum': {
      title: "Participant - SAHASAK NIMAVUM 2024",
      icon: "fa-microchip",
      description: "National Inventions Exhibition - Smart Cradle System",
      certificateImage: "achievements/sahasak-nimavum-certificate.jpg",
      additionalImages: [
        { src: "achievements/smart-cradle-system.jpg", caption: "Smart Cradle Project" },
        { src: "achievements/exhibition-booth.jpg", caption: "Exhibition Booth" },
        { src: "achievements/award-ceremony.jpg", caption: "Award Ceremony" }
      ],
      details: [
        "Presented IoT-based Smart Cradle System",
        "Integrated mobile app and AI features",
        "Represented university at national level",
        "Recognized by Sri Lanka Inventors Commission"
      ],
      date: "April 27, 2025",
      organizer: "Sri Lanka Inventors Commission"
    },
    'english-oratory': {
      title: "🥉 3rd Place - Province Level",
      icon: "fa-microphone-alt",
      description: "English Day Oratory Competition - Prepared Speech",
      certificateImage: "achievements/image.jpg",
      additionalImages: [
         { src: "achievements/english-oratory-certificate.jpg", caption: "District Level Competition" }
      ],
      details: [
        "Competed against multiple schools",
        "Delivered prepared speech with confidence",
        "Awarded 3rd place at provincial level",
        "Recognized for oratory skills"
      ],
      date: "School Year",
      organizer: "Provincial Education Department"
    }
  };

  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get("id");
  const data = achievementsData[id];
  const container = document.getElementById("achievementContent");

  if (data) {
    // Build additional images HTML
    let additionalImagesHtml = '';
    if (data.additionalImages && data.additionalImages.length > 0) {
      additionalImagesHtml = `
        <div class="event-gallery">
          <h3 class="gallery-title"><i class="fas fa-images"></i> Event Gallery</h3>
          <div class="additional-images">
            ${data.additionalImages.map(img => `
              <div class="additional-img" onclick="openLightbox('${img.src}', '${img.caption}')">
                <img src="${img.src}" alt="${img.caption}" onerror="this.src='https://placehold.co/400x300/1a1a2e/bf4bff?text=Image+Coming+Soon'">
                <p><i class="fas fa-search-plus"></i> ${img.caption}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    container.innerHTML = `
      <div class="achievement-icon"><i class="fas ${data.icon}"></i></div>
      <h2 class="achievement-title">${data.title}</h2>
      <p class="achievement-description">${data.description}</p>
      <div class="achievement-date"><i class="fas fa-calendar-alt"></i> ${data.date}</div>
      <div class="achievement-organizer"><i class="fas fa-building"></i> ${data.organizer}</div>
      
      <div class="certificate-section">
        <h3 class="certificate-title"><i class="fas fa-certificate"></i> Certificate</h3>
        <div class="certificate-image" onclick="openLightbox('${data.certificateImage}', '${data.title} - Certificate')">
          <img src="${data.certificateImage}" alt="Certificate" onerror="this.src='https://placehold.co/800x600/1a1a2e/bf4bff?text=Certificate'">
          <p style="text-align: center; padding: 8px; color: #bf4bff; font-size: 0.75rem;"><i class="fas fa-search-plus"></i> Click to enlarge</p>
        </div>
      </div>
      
      ${additionalImagesHtml}
      
      <div class="achievement-details-list">
        <h3><i class="fas fa-info-circle"></i> Achievement Details</h3>
        <ul>${data.details.map(d => `<li>${d}</li>`).join('')}</ul>
      </div>
    `;
  } else {
    container.innerHTML = `
      <div class="not-found">
        <i class="fas fa-exclamation-triangle"></i>
        <h2>Achievement Not Found</h2>
        <a href="index.html#achievements" class="back-home"><i class="fas fa-arrow-left"></i> Back to Achievements</a>
      </div>
    `;
  }
</script>

</body>
</html>
