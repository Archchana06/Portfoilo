<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Project Details | Archchana Vijayanathan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.6;
      cursor: default;
    }

    .project-header {
      padding: 100px 0 50px;
      text-align: center;
      background: linear-gradient(135deg, #0a0a0a, #0f0f15);
      border-bottom: 1px solid rgba(191, 75, 255, 0.2);
    }

    .project-header h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #bf4bff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .project-header p {
      color: #b0b0b0;
      margin-bottom: 1.5rem;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(191, 75, 255, 0.15);
      color: #bf4bff;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s;
      border: 1px solid rgba(191, 75, 255, 0.3);
      font-weight: 500;
    }

    .back-home:hover {
      background: rgba(191, 75, 255, 0.3);
      transform: translateY(-3px);
    }

    .project-detail-page {
      padding: 40px 0 80px;
      background: #0a0a0a;
      min-height: calc(100vh - 200px);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .project-container {
      max-width: 1000px;
      margin: 0 auto;
      background: #111115;
      border-radius: 30px;
      border: 1px solid #222;
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .project-banner {
      background: linear-gradient(135deg, rgba(191, 75, 255, 0.15), rgba(255, 107, 157, 0.08));
      padding: 40px;
      text-align: center;
      border-bottom: 1px solid rgba(191, 75, 255, 0.3);
    }

    .project-banner i {
      font-size: 4rem;
      color: #bf4bff;
      margin-bottom: 1rem;
    }

    .project-banner h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .project-banner p {
      color: #b0b0b0;
    }

    .project-gallery {
      padding: 40px;
    }

    .gallery-title {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #bf4bff;
      border-left: 4px solid #bf4bff;
      padding-left: 15px;
    }

    .project-image-main {
      width: 100%;
      border-radius: 20px;
      border: 1px solid #333;
      margin-bottom: 30px;
      overflow: hidden;
      background: #1a1a2e;
      cursor: pointer;
    }

    .project-image-main img {
      width: 100%;
      display: block;
      transition: transform 0.3s;
    }

    .project-image-main:hover img {
      transform: scale(1.02);
    }

    .project-screenshots {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    .screenshot {
      background: #1a1a2e;
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid #333;
      transition: all 0.3s;
      cursor: pointer;
    }

    .screenshot:hover {
      transform: translateY(-5px);
      border-color: #bf4bff;
    }

    .screenshot img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .screenshot p {
      padding: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: #bf4bff;
    }

    .project-details {
      background: #0a0a0a;
      padding: 25px;
      border-radius: 15px;
      margin-top: 20px;
      border: 1px solid #222;
    }

    .project-details h4 {
      color: #bf4bff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .project-details ul {
      list-style: none;
      padding-left: 0;
    }

    .project-details li {
      padding: 8px 0;
      padding-left: 25px;
      position: relative;
      color: #ccc;
    }

    .project-details li::before {
      content: '🚀';
      position: absolute;
      left: 0;
    }

    .tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 15px;
    }

    .tech-tag {
      background: rgba(191, 75, 255, 0.1);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.75rem;
      color: #bf4bff;
    }

    /* Button Container */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 20px 0;
      justify-content: center;
    }

    /* Prototype Button */
    .prototype-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #bf4bff, #9b30ff);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(191, 75, 255, 0.3);
    }

    .prototype-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px rgba(191, 75, 255, 0.5);
    }

    .prototype-btn i {
      font-size: 0.9rem;
    }

    /* Behance Button */
    .behance-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(191, 75, 255, 0.15);
      border: 1px solid rgba(191, 75, 255, 0.3);
      color: #bf4bff;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .behance-btn:hover {
      background: rgba(191, 75, 255, 0.3);
      transform: translateY(-3px);
      border-color: #bf4bff;
    }

    .behance-btn i {
      font-size: 0.9rem;
    }

    .info-row {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #222;
      color: #888;
      font-size: 0.9rem;
    }

    .info-row i {
      color: #bf4bff;
      width: 25px;
    }

    .not-found {
      text-align: center;
      padding: 60px;
    }

    .not-found i {
      font-size: 4rem;
      color: #bf4bff;
      margin-bottom: 1rem;
    }

    /* Lightbox Modal Styles */
    .lightbox-modal {
      display: none;
      position: fixed;
      z-index: 99999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      margin: auto;
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .lightbox-content img {
      width: 100%;
      height: auto;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid #bf4bff;
      box-shadow: 0 0 40px rgba(191, 75, 255, 0.3);
    }

    .lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: #fff;
      font-size: 35px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }

    .lightbox-close:hover {
      color: #bf4bff;
    }

    .lightbox-caption {
      text-align: center;
      color: #bf4bff;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .project-header h1 {
        font-size: 2rem;
      }
      .project-gallery {
        padding: 20px;
      }
      .project-banner {
        padding: 25px;
      }
      .project-banner h2 {
        font-size: 1.3rem;
      }
      .container {
        padding: 0 1rem;
      }
      .project-screenshots {
        grid-template-columns: 1fr;
      }
      .lightbox-content {
        max-width: 95%;
      }
      .button-container {
        flex-direction: column;
        align-items: stretch;
      }
      .prototype-btn, .behance-btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="project-header">
  <div class="container">
    <i class="fas fa-code" style="font-size: 3rem; color: #bf4bff;"></i>
    <h1>Project Details</h1>
    <p>Exploring my creative and technical work</p>
    <a href="index.html#projects" class="back-home">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>
  </div>
</div>

<section class="project-detail-page">
  <div class="container">
    <div id="projectContent" class="project-container">
      <div class="project-banner">
        <i class="fas fa-spinner fa-spin"></i>
        <h2>Loading...</h2>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox Modal -->
<div id="lightboxModal" class="lightbox-modal">
  <div class="lightbox-content">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImage" src="" alt="Project Image">
    <div id="lightboxCaption" class="lightbox-caption"></div>
  </div>
</div>

<script>
  // ========================================
  // PROJECT DATA - UPDATE YOUR LINKS HERE
  // ========================================
  // Replace the example links with your actual Figma prototype and Behance links
  // Just change the URL inside the quotes (e.g., 'https://your-actual-link.com')
  
  const projectsData = {
    'alerta': {
      title: 'Alerta - AI-Powered Disaster Management App',
      icon: 'fa-bell',
      description: 'A comprehensive disaster management solution with real-time alerts and SOS features.',
      mainImage: 'projects/Alerta Home page.png',
      screenshots: [
        { src: 'projects/alerta-screenshot1.jpg', caption: 'Dashboard View' },
        { src: 'projects/alerta-screenshot2.jpg', caption: 'Live Monitoring System' },
        { src: 'projects/alerta-screenshot3.jpg', caption: 'SOS Feature' }
      ],
      details: [
        'Realtime disaster alerts using AI prediction models',
        'SOS button with location sharing to emergency contacts',
        'Community reporting feature for crowdsourced updates',
        'Offline mode for areas with poor connectivity',
        'Multilanguage support for wider accessibility'
      ],
      prototypeLink: 'https://www.figma.com/proto/xhu22Pb6wh2ia43BNCgerI/Untitled?node-id=5-640&starting-point-node-id=5%3A640&t=IDkoHIzw6NCE731m-1',
      behanceLink: 'https://www.behance.net/gallery/248349015/Alerta-AI-Powered-Disaster-Guardian-for-Everyone',
  
  
    },
    'ecotrack': {
      title: 'EcoTrack - Sustainability Tracking App',
      icon: 'fa-leaf',
      description: 'Track household energy and waste usage with gamified challenges.',
      mainImage: 'projects/ecotrack-main.jpg',
      screenshots: [
        { src: 'projects/ecotrack-screenshot1.jpg', caption: 'Dashboard' },
        { src: 'projects/ecotrack-screenshot2.jpg', caption: 'Emerengy Bin Alert' },
        { src: 'projects/ecotrack-screenshot3.jpg', caption: 'Water Monitor' }
      ],
      details: [
        'Track daily energy consumption and carbon footprint',
        'Gamified challenges to encourage sustainable habits',
        'Personalized recommendations for reducing waste',
        'Community leaderboards for friendly competition',
        'Weekly reports and progress insights'
      ],
      prototypeLink: 'https://www.figma.com/proto/WkNqKHpcq5MQw2HHHNeCe9/ECHO-TRACKK?t=TWD04gmP8d51S2gO-1&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&node-id=1-363&starting-point-node-id=1%3A360',
      behanceLink: 'https://www.behance.net/gallery/248599873/Real-Time-Resource-Monitoring-Sustainability-App',
     
    },
    'smart-campus': {
      title: 'Smart Campus App - University Navigation',
      icon: 'fa-university',
      description: 'Student navigation and services platform for university campuses.',
      mainImage: 'projects/smart-campus-main.jpg',
      screenshots: [
        { src: 'projects/smart-campus-screenshot1.jpg', caption: 'Study Space Navigation' },
        { src: 'projects/smart-campus-screenshot2.jpg', caption: 'Dashboard' },
        { src: 'projects/smart-campus-screenshot3.jpg', caption: 'Ai Notes Summerizer' }
      ],
      details: [
        'Interactive campus map with building navigation',
        'Real time resource booking for labs and study rooms',
        'Event calendar with push notifications',
        'Bus tracking and schedule information',
        'Canteen menu and ordering system'
      ],
      prototypeLink: 'https://www.figma.com/proto/Mhy7rdtbDRBHRgYc4QAn2V/Smart-Campus?node-id=4-94&t=klO0gzrPXtl1be2h-1&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=2%3A3&show-proto-sidebar=1',
      // behanceLink: 'https://www.behance.net/gallery/236773041/Campus-Mate',
     
    },
    'auro-app': {
      title: 'Auro App - Digital Guidance Platform',
      icon: 'fa-heart',
      description: 'Career mentorship and skill development platform.',
      mainImage: 'projects/auro-main.jpg',
      screenshots: [
        { src: 'projects/auro-screenshot1.jpg', caption: 'Gesture mode' },
        { src: 'projects/auro-screenshot2.jpg', caption: 'Home Page' },
        { src: 'projects/auro-screenshot3.jpg', caption: 'Watch pairing' }
      ],
      details: [
        'Predicts health issues 30 minutes before they happen using AI and sensors',
        'Ambient AI companion speaks to you naturally like a caring health coach',
        'Gesture based SOS triggered by wrist tap and fist clench  no screen needed',
        'Haptic vibration navigation guides you to nearest hospital completely hands-free',
        'AR medicine scanner identifies any medicine instantly via phone camera'
      ],
      prototypeLink: 'https://www.figma.com/proto/poGN2fNtqCUuJG3oDc11xQ/Aura?t=eH1Nj6heEvQaNedO-1&scaling=contain&content-scaling=responsive&page-id=0%3A1&node-id=1-233&starting-point-node-id=1%3A233&show-proto-sidebar=1',
      behanceLink: 'https://www.behance.net/gallery/248201675/Aura-AI-Health-Companion',

    },
    'ai-cofounder': {
      title: 'AI Co-Founder - AI UX Assistant Concept',
      icon: 'fa-robot',
      description: 'AI-powered assistant that helps designers generate wireframes and user flows.',
      mainImage: 'projects/ai-cofounder-main.jpg',
      screenshots: [
        { src: 'projects/ai-cofounder-screenshot1.jpg', caption: 'Wireframe Generator' },
        { src: 'projects/ai-cofounder-screenshot2.jpg', caption: 'User Flow' },
         { src: 'projects/ai-cofounder-screenshot2.jpg', caption: 'Idea generator' }
      ],
      details: [
        'Generate wireframes from text descriptions using AI',
        'Create user flows automatically based on requirements',
        'Design system suggestions and component recommendations',
        'Accessibility checker and improvement suggestions',
        'Export to Figma and other design tools'
      ],
      prototypeLink: 'https://www.figma.com/proto/example/ai-cofounder-prototype',
      behanceLink: 'https://www.behance.net/gallery/example/ai-cofounder-project',
     
    }
  };

  // Lightbox functionality
  const lightboxModal = document.getElementById('lightboxModal');
  const lightboxImage = document.getElementById('lightboxImage');
  const lightboxCaption = document.getElementById('lightboxCaption');
  const closeBtn = document.querySelector('.lightbox-close');

  function openLightbox(imageSrc, caption) {
    lightboxImage.src = imageSrc;
    lightboxCaption.textContent = caption;
    lightboxModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightboxModal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  // Close when clicking on X
  if (closeBtn) {
    closeBtn.addEventListener('click', closeLightbox);
  }

  // Close when clicking outside the image
  lightboxModal.addEventListener('click', (e) => {
    if (e.target === lightboxModal) {
      closeLightbox();
    }
  });

  // Close with Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightboxModal.style.display === 'flex') {
      closeLightbox();
    }
  });

  // Get project ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const projectId = urlParams.get('id');

  // Load project data
  if (projectId && projectsData[projectId]) {
    const data = projectsData[projectId];
    const container = document.getElementById('projectContent');
    
    // Build screenshots HTML with click handlers
    let screenshotsHtml = '';
    if (data.screenshots && data.screenshots.length > 0) {
      screenshotsHtml = `
        <h3 class="gallery-title" style="margin-top: 20px;"><i class="fas fa-images"></i> Project Screenshots</h3>
        <div class="project-screenshots">
          ${data.screenshots.map((img, index) => `
            <div class="screenshot" onclick="openLightbox('${img.src}', '${img.caption}')">
              <img src="${img.src}" alt="${img.caption}" onerror="this.src='https://placehold.co/400x300/1a1a2e/bf4bff?text=Image+Coming+Soon'">
              <p><i class="fas fa-search-plus"></i> Click to enlarge - ${img.caption}</p>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    // Build buttons HTML (Prototype + Behance)
    let buttonsHtml = '';
    if (data.prototypeLink || data.behanceLink) {
      buttonsHtml = `
        <div class="button-container">
          ${data.prototypeLink ? `
            <a href="${data.prototypeLink}" target="_blank" rel="noopener noreferrer" class="prototype-btn">
              <i class="fas fa-external-link-alt"></i> View Interactive Prototype
            </a>
          ` : ''}
          ${data.behanceLink ? `
            <a href="${data.behanceLink}" target="_blank" rel="noopener noreferrer" class="behance-btn">
              <i class="fab fa-behance"></i> View on Behance
            </a>
          ` : ''}
        </div>
      `;
    }
    
    // Build tech stack HTML
    let techStackHtml = '';
    if (data.techStack && data.techStack.length > 0) {
      techStackHtml = `
        <div class="tech-stack">
          ${data.techStack.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
        </div>
      `;
    }
    
    // Build details HTML
    let detailsHtml = '';
    if (data.details && data.details.length > 0) {
      detailsHtml = `
        <div class="project-details">
          <h4><i class="fas fa-info-circle"></i> Project Details</h4>
          <ul>
            ${data.details.map(detail => `<li>${detail}</li>`).join('')}
          </ul>
          ${buttonsHtml}
          
        </div>
      `;
    }
    
    container.innerHTML = `
      <div class="project-banner">
        <i class="fas ${data.icon}"></i>
        <h2>${data.title}</h2>
        <p>${data.description}</p>
      </div>
      <div class="project-gallery">
        <h3 class="gallery-title"><i class="fas fa-desktop"></i> Project Preview</h3>
        <div class="project-image-main" onclick="openLightbox('${data.mainImage}', '${data.title} - Main Preview')">
          <img src="${data.mainImage}" alt="${data.title}" onerror="this.src='https://placehold.co/800x600/1a1a2e/bf4bff?text=Project+Image'">
          <p style="text-align: center; padding: 8px; color: #bf4bff; font-size: 0.75rem;"><i class="fas fa-search-plus"></i> Click to enlarge</p>
        </div>
        ${screenshotsHtml}
        ${detailsHtml}
      </div>
    `;
  } else {
    document.getElementById('projectContent').innerHTML = `
      <div class="project-banner not-found">
        <i class="fas fa-exclamation-triangle"></i>
        <h2>Project Not Found</h2>
        <p>The project you're looking for doesn't exist.</p>
        <a href="index.html#projects" class="back-home" style="margin-top: 20px; display: inline-flex;">
          <i class="fas fa-arrow-left"></i> Back to Projects
        </a>
      </div>
    `;
  }
</script>

</body>
</html>
